<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comprando muebles</title>
    <link rel="stylesheet" href="Comprandomuebles.css">
</head>
<body>

    <div class="contenedor">
        <h1>Comprando muebles</h1>

        <div class="carrito">
            🛒 <span id="contador">0</span> 
        </div>

        <div class="tarjeta">
            <h2>Silla Living</h2>
            <img src="./silla.jpg"
                 alt="Silla Living">
            <p>Una hermosa silla para su casa donde poder relajarse.</p>
            <h3>$2500</h3>
            <button id="comprar">
                Comprar
            </button>

        </div>

        <div class="acciones">

            <button id="sacar">
                Sacar producto
            </button>

            <div id="total">
                TOTAL: $0
            </div>

        </div>

    </div>

    <script src="Comprandomuebles.js"></script>

</body>
</html>
