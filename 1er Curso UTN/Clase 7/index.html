<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Clase -7 </title>
</head>
<body>
    <h1>Formularios - validadores</h1>
    <form onsubmit="enviarFormulario(event)">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" required="">

        <label for="correo" id="labelEmail">Email</label>
        <input type="email" id="correo" name="correo" disabled="" required=""><!-- @ . -->

        <label for="password">contraseña</label>
        <input type="password" id="password" name="password" minlength="8" required="" oninput="verificacionContrasena(this)"><!-- oculta la informacion-->
        <p id="mensaje">La contraseña debe tener como minimo 8 caracteres</p>

        <button class="boton" id="show">Mostrar contraseña</button>

        <label for="comentario">Comentarios</label>
        <textarea name="comentario" id="comentario"></textarea>
        
        <label for="edad">edad</label>
        <input type="number" name="edad" id="edad" min="16" max="110">

        <input class="boton" type="submit" value="enviar">
    </form>
    <form id="form2">
        <label for="palabra">Indique el nombre a buscar</label>
        <input type="text" id="palabra">
        <input class="boton" type="submit" value="buscar">
        
    </form>

    <script src="./ejercicios.js"></script>


</body></html>
