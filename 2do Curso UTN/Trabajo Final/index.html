<html lang="en" class="dark"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/icons/icon-code.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>Proyecto-Final</title>
    <script>
        // Inline script to prevent theme flash (FOUC)
        (function() {
            const savedTheme = localStorage.getItem("theme") || "night";
            if (savedTheme === "night") {
                document.documentElement.className = "dark";
            } else {
                document.documentElement.className = "light";
            }
        })();
    </script>
</head>
<body class="body-night" onscroll="navChange()">
    <!-- Floating Theme Switcher Button -->
    <button class="button-theame day" onclick="changeTheame(this)">
        <img src="./assets/icons/sun.svg" alt="Theme Toggle">
    </button>

    <!-- Top Navigation Bar -->
    <nav class="fondoNav" style="--nav-opacity: 1;">
        <a href="/">
            <svg width="200" height="90">

                <rect x="50" y="10" width="70" height="40" class="mon2"></rect>
                <rect x="75" y="55" width="20" height="10" class="mon1"></rect>

                <polygon points="50 70,120 70 ,130 80,40 80" class="mon1"></polygon>
                <polygon points="55 72,115 72  ,122 78,48 78" class="mon2"></polygon>

                <line x1="55" y1="19" x2="100" y2="19" class="cod"></line>
                <line x1="55" y1="24" x2="100" y2="24" class="cod"></line>
                <line x1="55" y1="29" x2="70" y2="29" class="cod"></line>

    <main>
        <h2 class="espacio-titulo">Armemos el rompecabezas y veamos que imagen es...</h2>

        <section class="juego">
            <div id="seccion-superior">
                <img class="imagenes" id="imagen1" src="./assets/imagenes/rompe2.png" alt="imagen-rompecabezas" draggable="true">

                    </div>
                </div>

            </div>
            <div id="seccion-inferior">
                <img class="imagenes" id="imagen3" src="./assets/imagenes/Rompe3.png" alt="imagen-rompecabezas" draggable="true">
